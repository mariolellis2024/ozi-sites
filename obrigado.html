<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pela compra | Alanis</title>
    <meta name="description" content="Sua compra foi confirmada! Acesse sua área de membros Alanis agora.">

    <link rel="icon" type="image/webp" href="images/favicon.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">



    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-accent: #75fbc6;
            --color-accent-hover: #5ee0ad;
            --color-bg-primary: #1a1a1a;
            --color-bg-secondary: #202020;
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #a8a8b8;
            --color-glow: rgba(117, 251, 198, 0.15);
            --color-cta: #75fbc6;
            --color-cta-text: #1a1a1a;
            --radius-full: 999px;
            --radius-large: 24px;
            --shadow-glow: 0 0 30px rgba(117, 251, 198, 0.2);
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== GLOW EFFECTS ===== */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            animation: pulse-glow 5s ease-in-out infinite;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            top: -120px;
            right: -80px;
            background: radial-gradient(circle, var(--color-glow) 0%, transparent 70%);
        }

        .glow-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(117, 251, 198, 0.08) 0%, transparent 70%);
        }

        .glow-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(117, 251, 198, 0.06) 0%, transparent 70%);
            animation-delay: 1.5s;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.45;
                transform: scale(1.15);
            }
        }

        .glow-3 {
            animation-name: pulse-glow;
        }

        /* ===== CARD ===== */
        .thankyou-card {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 620px;
            padding: 48px 40px;
            animation: card-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== LOGO ===== */
        .thankyou-logo {
            height: 48px;
            width: auto;
            margin: 0 auto 48px;
            display: block;
        }

        /* ===== CHECK ANIMATION ===== */
        .check-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            border-radius: 50%;
            background: var(--color-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(117, 251, 198, 0.35);
            animation: pop-in 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: scale(0);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .check-circle svg {
            width: 40px;
            height: 40px;
            color: var(--color-bg-primary);
        }

        .check-circle svg polyline {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: draw-check 0.5s 0.6s ease forwards;
        }

        @keyframes draw-check {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* ===== TEXT ===== */
        .thankyou-headline {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.15;
            color: var(--color-text-primary);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            animation: fade-up 0.6s 0.5s ease both;
        }

        .thankyou-headline .accent {
            color: var(--color-accent);
        }

        .thankyou-reminder {
            font-size: 1.125rem;
            color: var(--color-text-secondary);
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto 40px;
            animation: fade-up 0.6s 0.7s ease both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CTA BUTTON ===== */
        .btn-access {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--color-cta);
            color: var(--color-cta-text);
            padding: 16px 40px;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 200ms ease;
            box-shadow: var(--shadow-glow);
            animation: fade-up 0.6s 0.9s ease both;
        }

        .btn-access:hover {
            background: var(--color-accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(117, 251, 198, 0.35);
        }

        .btn-access svg {
            width: 20px;
            height: 20px;
        }

        /* ===== CONFETTI / SPARKLE PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: float-up 3s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            15% {
                opacity: 1;
            }

            85% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateY(-20vh) scale(1);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .thankyou-card {
                padding: 32px 24px;
            }

            .thankyou-logo {
                height: 36px;
                margin-bottom: 36px;
            }

            .check-circle {
                width: 64px;
                height: 64px;
                margin-bottom: 24px;
            }

            .check-circle svg {
                width: 32px;
                height: 32px;
            }

            .thankyou-headline {
                font-size: 1.75rem;
            }

            .thankyou-reminder {
                font-size: 1rem;
            }

            .btn-access {
                padding: 14px 32px;
                font-size: 1rem;
            }

            .glow-1 {
                width: 280px;
                height: 280px;
            }

            .glow-2 {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <!-- Background glows -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <!-- Sparkle particles -->
    <div class="particles" id="particles"></div>

    <!-- Main card -->
    <div class="thankyou-card">
        <img src="images/logo.webp" alt="Alanis" class="thankyou-logo">

        <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="4 12 9 17 20 6" />
            </svg>
        </div>

        <h1 class="thankyou-headline">Alô, parabéns!<br>Sua compra foi <span class="accent">confirmada</span>.</h1>

        <p class="thankyou-reminder">Por favor, clique no botão abaixo e crie sua conta com o <strong
                style="color:#FFFFFF;">mesmo e-mail usado na
                compra</strong>.</p>

        <a href="https://app.alanis.digital/#/cadastro" class="btn-access" id="btn-access">
            Acessar Área de Membros
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
        </a>
    </div>

    <script>
        // Generate celebration particles
        (function () {
            const container = document.getElementById('particles');
            const colors = ['#75fbc6', '#5ee0ad', '#ffffff', '#a8a8b8', '#75fbc6'];
            const count = 30;

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = (3 + Math.random() * 5) + 'px';
                p.style.height = p.style.width;
                p.style.animationDelay = (Math.random() * 2) + 's';
                p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
                container.appendChild(p);
            }
        })();
    </script>

</body>

</html>
